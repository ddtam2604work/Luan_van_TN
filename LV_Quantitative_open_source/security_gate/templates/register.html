<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Supply Chain Guard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand-primary: #4f46e5; --brand-secondary: #4338ca; --bg-body: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); display: flex; flex-direction: column; min-height: 100vh; }
        
        .navbar-custom { background: rgba(79, 70, 229, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .auth-wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { width: 100%; max-width: 550px; border-radius: 1.25rem; border: none; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); background: #fff;}
        .btn-brand { background-color: var(--brand-primary); border-color: var(--brand-primary); color: white; font-weight: 600; }
        .btn-brand:hover { background-color: var(--brand-secondary); border-color: var(--brand-secondary); color: white; }
        .btn-brand:disabled { background-color: #a5b4fc; border-color: #a5b4fc; cursor: not-allowed; }
        
        /* Cấu hình Input Mật khẩu */
        .password-container { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #64748b; }
        .toggle-password:hover { color: var(--brand-primary); }

        /* Cấu hình Thanh độ mạnh mật khẩu */
        .strength-meter-container { height: 6px; background-color: #e2e8f0; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .strength-meter-fill { height: 100%; width: 0%; border-radius: 10px; transition: all 0.4s ease; }
        .strength-text { font-size: 0.75rem; font-weight: 700; margin-top: 5px; text-align: right; transition: color 0.3s ease; }

        /* Cấu hình Checklist gợi ý */
        .password-hints { list-style: none; padding: 0; margin-top: 12px; margin-bottom: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .password-hints li { font-size: 0.8rem; color: #94a3b8; display: flex; align-items: center; transition: color 0.3s; }
        .password-hints li i { font-size: 0.75rem; margin-right: 6px; }
        .password-hints li.valid { color: #10b981; }
        .password-hints li.valid i::before { content: "\f058"; /* fa-circle-check */ }
        .password-hints li.invalid i::before { content: "\f111"; /* fa-circle */ font-weight: 400; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm sticky-top">
        <div class="container-lg">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <div class="bg-white rounded-circle p-1 me-2 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                    <i class="fa-solid fa-shield-halved text-primary fs-6"></i>
                </div>
                GuardPro
            </a>
            <div class="d-flex">
                <a href="/login" class="btn btn-outline-light btn-sm px-4 fw-bold rounded-pill">Đăng nhập</a>
            </div>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="card auth-card p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-rocket mb-3" style="font-size: 3rem; color: var(--brand-primary);"></i>
                <h2 class="h4 fw-bold text-dark mb-1">Khởi tạo Workspace</h2>
                <p class="small text-muted">Đăng ký không gian làm việc an toàn cho tổ chức</p>
            </div>

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center p-3 mb-4 rounded-3 shadow-sm border-0 bg-danger-subtle text-danger" role="alert">
                <i class="fa-solid fa-triangle-exclamation me-2"></i>
                <div class="small fw-semibold">{{ error }}</div>
            </div>
            {% endif %}

            <form action="/register" method="POST" id="registerForm">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">Tên Tổ chức</label>
                        <input type="text" name="org_name" class="form-control bg-light" placeholder="TechCorp Inc." required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">Người đại diện</label>
                        <input type="text" name="full_name" class="form-control bg-light" placeholder="Nguyễn Văn A" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Email làm việc</label>
                    <input type="email" name="email" class="form-control bg-light" placeholder="you@company.com" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Mật khẩu</label>
                    <div class="password-container">
                        <input type="password" id="password" name="password" class="form-control bg-light pe-5" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                    
                    <div class="strength-meter-container">
                        <div class="strength-meter-fill" id="strengthMeter"></div>
                    </div>
                    <div class="strength-text text-muted" id="strengthText">Chưa nhập</div>

                    <ul class="password-hints">
                        <li id="rule-length" class="invalid"><i class="fa-regular fa-circle"></i> Tối thiểu 8 ký tự</li>
                        <li id="rule-upper" class="invalid"><i class="fa-regular fa-circle"></i> Chữ in hoa (A-Z)</li>
                        <li id="rule-lower" class="invalid"><i class="fa-regular fa-circle"></i> Chữ in thường (a-z)</li>
                        <li id="rule-number" class="invalid"><i class="fa-regular fa-circle"></i> Ít nhất 1 chữ số (0-9)</li>
                        <li id="rule-special" class="invalid"><i class="fa-regular fa-circle"></i> Ký tự đặc biệt (!@#$...)</li>
                    </ul>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-brand btn-lg w-100 fs-6 rounded-pill shadow-sm" disabled>
                    Tạo tài khoản miễn phí
                </button>
            </form>

            <div class="text-center mt-4 pt-4 border-top">
                <small class="text-muted">Đã có không gian riêng? <a href="/login" class="fw-bold text-decoration-none" style="color: var(--brand-primary);">Đăng nhập ngay</a></small>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const strengthMeter = document.getElementById('strengthMeter');
            const strengthText = document.getElementById('strengthText');
            const submitBtn = document.getElementById('submitBtn');

            // Khai báo Regex cho từng quy tắc
            const rules = {
                length: { regex: /.{8,}/, el: document.getElementById('rule-length') },
                upper: { regex: /[A-Z]/, el: document.getElementById('rule-upper') },
                lower: { regex: /[a-z]/, el: document.getElementById('rule-lower') },
                number: { regex: /[0-9]/, el: document.getElementById('rule-number') },
                special: { regex: /[^A-Za-z0-9]/, el: document.getElementById('rule-special') }
            };

            // Toggle Ẩn/Hiện mật khẩu
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            // Logic tính toán độ mạnh mỗi khi gõ
            passwordInput.addEventListener('input', function() {
                const val = this.value;
                let score = 0;
                let validCount = 0;

                // Kiểm tra từng quy tắc và cập nhật UI Checklist
                for (const key in rules) {
                    if (rules[key].regex.test(val)) {
                        rules[key].el.classList.replace('invalid', 'valid');
                        validCount++;
                    } else {
                        rules[key].el.classList.replace('valid', 'invalid');
                    }
                }

                // Tính điểm cơ bản (0 -> 5)
                score = validCount;
                
                // Thưởng thêm điểm nếu mật khẩu dài trên 12 ký tự (Tiêu chuẩn an toàn cao)
                if (val.length >= 12 && validCount >= 3) score += 1;

                // Xử lý giao diện thanh độ mạnh
                if (val.length === 0) {
                    strengthMeter.style.width = '0%';
                    strengthMeter.style.backgroundColor = 'transparent';
                    strengthText.textContent = 'Chưa nhập';
                    strengthText.style.color = '#94a3b8';
                    submitBtn.disabled = true;
                } else if (score <= 2) {
                    strengthMeter.style.width = '25%';
                    strengthMeter.style.backgroundColor = '#ef4444'; // Đỏ
                    strengthText.textContent = 'Yếu';
                    strengthText.style.color = '#ef4444';
                    submitBtn.disabled = true; // Chặn đăng ký nếu quá yếu
                } else if (score === 3 || score === 4) {
                    strengthMeter.style.width = '50%';
                    strengthMeter.style.backgroundColor = '#f59e0b'; // Cam
                    strengthText.textContent = 'Trung bình';
                    strengthText.style.color = '#f59e0b';
                    submitBtn.disabled = false;
                } else if (score === 5) {
                    strengthMeter.style.width = '75%';
                    strengthMeter.style.backgroundColor = '#3b82f6'; // Xanh dương
                    strengthText.textContent = 'Mạnh';
                    strengthText.style.color = '#3b82f6';
                    submitBtn.disabled = false;
                } else if (score >= 6) {
                    strengthMeter.style.width = '100%';
                    strengthMeter.style.backgroundColor = '#10b981'; // Xanh lá
                    strengthText.textContent = 'Rất mạnh';
                    strengthText.style.color = '#10b981';
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
