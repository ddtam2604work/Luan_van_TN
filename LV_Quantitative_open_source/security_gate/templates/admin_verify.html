<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực Quản trị viên - GuardPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand-gradient: linear-gradient(135deg, #1b262c 0%, #0f4c75 100%); }
        body { background-color: #f4f7f6; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar-verify { background: var(--brand-gradient); border-bottom: 2px solid #dc3545; }
        .verify-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .verify-card { max-width: 450px; width: 100%; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: white; padding: 40px; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-verify shadow-sm">
        <div class="container-lg">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <div class="bg-white rounded-circle p-1 me-2 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                    <i class="fa-solid fa-shield-halved text-danger fs-6"></i>
                </div>
                GuardPro <span class="ms-2 badge bg-danger small" style="font-size: 0.5em;">SECURE MODE</span>
            </a>
            {% if user %}
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small">Xin chào, <strong>Admin</strong></span>
                <a href="/logout" class="btn btn-outline-light btn-sm px-3 rounded-pill fw-bold">Đăng xuất</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="verify-container">
        <div class="verify-card text-center">
            <div class="mb-4">
                <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                    <i class="fa-solid fa-key fa-3x text-danger"></i>
                </div>
                <h3 class="fw-bold text-dark">Xác minh danh tính</h3>
                <p class="text-muted small">Nhập mã bảo mật để tiếp tục.</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% endif %}

            <form action="/admin/verify" method="POST">
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="security_code" name="security_code" placeholder="Mã bảo mật" required autofocus>
                    <label for="security_code">Mã xác thực hệ thống</label>
                </div>
                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold text-uppercase shadow-sm">Xác nhận truy cập</button>
            </form>
        </div>
    </div>
</body>
</html>
